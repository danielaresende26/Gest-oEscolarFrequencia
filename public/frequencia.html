<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preenchimento - Gestão Escolar</title>
  <link rel="stylesheet" href="./css/main.css">
  <link rel="stylesheet" href="./css/excel.css">
</head>
<body>

  <header>
    <div class="brand">
      <span>📅</span> Frequências
    </div>
    <div class="nav-links">
      <a href="equipe.html?v=3" id="navEquipe" class="btn-ghost" title="Gerenciar Equipe">👥 Equipe</a>
      <a href="cadastro.html" class="btn-ghost" title="Cadastrar Alunos e Turmas">⚙️ Gestão</a>
      <a href="relatorio.html" class="btn-ghost" title="Visualizar Relatório Semanal">📅 Semanal</a>
      <span id="userName" class="user-info">Professor(a)</span>
      <button onclick="logout()" class="btn-outline">Sair</button>
    </div>
  </header>

  <main>
    <div class="tools-ribbon">
      <div class="ribbon-controls">
        <div class="form-group" style="margin: 0;">
          <label>Selecione a Turma</label>
          <select id="turmaSelect" onchange="carregarGrade()">
            <option value="">Carregando...</option>
          </select>
        </div>
        <div class="form-group" style="margin: 0;">
          <label>Mês</label>
          <select id="mesSelect" onchange="carregarGrade()">
            <option value="1">Janeiro</option>
            <option value="2">Fevereiro</option>
            <option value="3">Março</option>
            <option value="4">Abril</option>
            <option value="5">Maio</option>
            <option value="6">Junho</option>
            <option value="7">Julho</option>
            <option value="8">Agosto</option>
            <option value="9">Setembro</option>
            <option value="10">Outubro</option>
            <option value="11">Novembro</option>
            <option value="12">Dezembro</option>
          </select>
        </div>
      </div>
      <div>
        <button class="btn btn-primary" onclick="salvarGrade()" id="btnSave">
          <svg style="width:16px;height:16px" viewBox="0 0 24 24">
            <path fill="currentColor" d="M19 12v7H5v-7H3v7c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2v-7h-2zm-6 2l-6-6h4V3h4v5h4l-6 6z"/>
          </svg>
          Salvar Alterações
        </button>
      </div>
    </div>

    <!-- Container do Excel -->
    <div class="excel-container" id="gridContainer">
      <!-- Gerado via JS -->
      Carregando interface da grade...
    </div>

  </main>

    <!-- Toast Notification WhatsApp (LGPD) -->
    <div id="waToast" class="wa-toast" style="display: none;">
      <div class="wa-toast-content">
        <span class="wa-icon">📲</span>
        <div class="wa-text">
          <strong id="waToastTitle">Falta Registrada</strong>
          <p id="waToastMsg">Deseja enviar o aviso automático ao responsável?</p>
        </div>
      </div>
      <div class="wa-actions">
        <button class="btn-ghost" onclick="fecharToast()">Agora não</button>
        <button class="btn-wa" id="btnEnviarWA">Enviar Aviso</button>
      </div>
    </div>
  <footer style="text-align:center; padding: 2rem; color: #94A3B8; font-size: 0.8rem;">
    Gestão Escolar &copy; 2026 - Versão 2.1 <span style="color:#10B981">●</span>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
  <script src="./js/api.v3.js"></script>
  <script src="./js/excel.v3.js"></script>

  <script>
    // Inicialização do Mês Atual
    const t = new Date();
    document.getElementById('mesSelect').value = t.getMonth() + 1;

    async function checkAuthAndLoad() {
      await window.initSupabase();

      if (!supabaseClient) {
         window.location.href = './index.html';
         return;
      }

      // 1. Verificar Sessão
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (!session) {
        window.location.href = './index.html';
        return;
      }

      try {
        // 2. Buscar Perfil e Escola
        const { data: userData } = await supabaseClient
          .from('usuarios')
          .select('nome, escola_id')
          .eq('id', session.user.id)
          .single();

        if (userData) {
          document.getElementById('userName').innerText = `Professor(a) ${userData.nome.split(' ')[0]}`;
          
          // 3. Buscar Turmas da Escola
          const turmas = await apiFetch(`/turmas?escola_id=${userData.escola_id}`);
          
          if (turmas.length > 0) {
            document.getElementById('turmaSelect').innerHTML = turmas.map(t => 
              `<option value="${t.id}">${t.nome} (${t.periodo})</option>`
            ).join('');
            
            // 4. Carregar Grade da Primeira Turma
            carregarGrade();
          } else {
            document.getElementById('turmaSelect').innerHTML = '<option value="">Crie uma turma na Gestão</option>';
            document.getElementById('gridContainer').innerHTML = `
              <div class="glass-panel" style="padding: 2rem; text-align: center;">
                <h3>Nenhuma turma encontrada.</h3>
                <p>Acesse a aba ⚙️ Gestão no topo para cadastrar sua primeira turma.</p>
              </div>`;
          }
        }
      } catch (e) {
        console.error("Erro ao carregar dados:", e);
        document.getElementById('turmaSelect').innerHTML = '<option value="">Erro ao carregar</option>';
      }
    }

    function logout() {
      if(supabaseClient) {
        supabaseClient.auth.signOut().then(() => {
          window.location.href = './index.html';
        });
      }
    }

    window.onload = checkAuthAndLoad;
  </script>
</body>
</html>
