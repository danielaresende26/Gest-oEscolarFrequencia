<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - Gestão Escolar Autônoma</title>
  <link rel="stylesheet" href="./css/main.css">
  <style>
    /* Estilos Locais de Auth */
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, var(--bg-color), #D1FAE5);
    }
    .login-container {
      max-width: 400px;
      width: 100%;
      text-align: center;
    }
    .logo {
      font-size: 2.5rem;
      margin-bottom: 2rem;
      color: var(--primary);
    }
    .info { margin-top: 1.5rem; color: var(--text-muted); font-size: 0.9rem;}
  </style>
</head>
<body>

  <div class="glass-panel login-container">
    <div class="logo">
      <span>📚</span> Gestão Escolar
    </div>
    <h2>Acesse sua Conta</h2>
    
    <form id="loginForm" style="margin-top: 1.5rem">
      <div class="form-group" style="text-align: left;">
        <label for="email">E-mail Profissional</label>
        <input type="email" id="email" class="input-control" placeholder="escola@dominio.com" required>
      </div>

      <div class="form-group" style="text-align: left;">
        <label for="password">Senha</label>
        <input type="password" id="password" class="input-control" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem; font-size: 1.1rem; margin-top: 1rem;">
        Entrar no Sistema
      </button>

      <p id="errorMsg" style="color: var(--danger-text); margin-top: 1rem; display: none;"></p>
    </form>

    <div class="info">
      <p>Gerenciamento inteligente de frequências e disparos via WhatsApp.</p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.42.0/dist/umd/supabase.js"></script>
  <script src="./js/api.v3.js"></script>
  <script>
    // Inicializa carregando as chaves dinâmicas ao load da página
    document.addEventListener('DOMContentLoaded', async () => {
      await window.initSupabase();
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const errorMsg = document.getElementById('errorMsg');
      errorMsg.style.display = 'none';

      if (!supabaseClient) {
        errorMsg.textContent = 'Erro Interno: Cliente Supabase não está pronto.';
        errorMsg.style.display = 'block';
        return;
      }

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;
        
        // Buscar Perfil para Redirecionamento
        const { data: profile } = await supabaseClient
          .from('usuarios')
          .select('perfil')
          .eq('id', data.user.id)
          .single();

        if (profile && profile.perfil === 'admin') {
          window.location.href = './dashboard.html';
        } else {
          window.location.href = './frequencia.html';
        }
      } catch (err) {
        errorMsg.textContent = 'Credenciais inválidas: ' + (err.message === 'Invalid login credentials' ? 'E-mail ou senha incorretos' : err.message);
        errorMsg.style.display = 'block';
      }
    });
  </script>
</body>
</html>
